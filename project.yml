name: Tama
options:
  bundleIdPrefix: com.unstablemind
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.1"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

packages:
  RiveRuntime:
    url: https://github.com/rive-app/rive-ios
    from: "6.18.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.1"
  kokoro-ios:
    url: https://github.com/mlalma/kokoro-ios.git
    from: "1.0.11"
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    exactVersion: "0.30.2"
  MLXUtilsLibrary:
    url: https://github.com/mlalma/MLXUtilsLibrary.git
    exactVersion: "0.0.6"

schemes:
  Tama:
    build:
      targets:
        Tama: all
        TamaTests: [test]
    test:
      targets:
        - TamaTests

targets:
  Tama:
    type: application
    platform: macOS
    sources:
      - path: tama/Sources
      - path: tama/Assets.xcassets
      - path: tama/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unstablemind.tama
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: 396M7LY29W
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        INFOPLIST_KEY_CFBundleDisplayName: Tama
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Tama needs microphone access for speech recognition when you hold ⌥Space to speak."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Tama uses speech recognition to transcribe your voice commands."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Tama uses accessibility features to interact with other apps on your behalf."
    dependencies:
      - package: RiveRuntime
      - package: Highlightr
      - package: kokoro-ios
        product: KokoroSwift
        embed: true
      - package: mlx-swift
        product: MLX
      - package: MLXUtilsLibrary
        product: MLXUtilsLibrary
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --config "${SRCROOT}/.swiftlint.yml" || true
          fi
        outputFiles: []
      - name: SwiftFormat Check
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftformat >/dev/null 2>&1; then
            swiftformat --lint --config "${SRCROOT}/.swiftformat" "${SRCROOT}/tama/Sources" || true
          fi
        outputFiles: []
  TamaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tama/Tests
    dependencies:
      - target: Tama
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unstablemind.tama.tests
        GENERATE_INFOPLIST_FILE: YES
